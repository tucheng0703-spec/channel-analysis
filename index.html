        #chart { width: 100%; height: 700px; }
        .legend-section {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px 30px;
            background: #fafafa;
        }
        .legend-group {
            flex: 1;
            min-width: 280px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);

        .legend-group.business h3 { color: #fa8c16; border-color: #fa8c16; }
        .legend-item {

            padding: 6px 12px;
            margin: 4px;
            background: #f5f5f5;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .legend-item:hover { transform: scale(1.05); }
        .legend-item.inactive { opacity: 0.4; text-decoration: line-through; }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .tip {
            padding: 15px 30px;
            background: #e6f7ff;
            border-left: 4px solid #1890ff;
